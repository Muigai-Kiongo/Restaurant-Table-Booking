{% extends 'base.html' %}

{% block title %}Reports | Gourmet Reserve{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-10">
        <h1 class="section-title h2 mb-4">Reports Panel</h1>
        
        <div class="form-card shadow-sm mb-5">
            <h2 class="h5 mb-3 fw-bold text-dark"><i class="bi bi-file-earmark-bar-graph me-2"></i>Generate Reports</h2>
            <form method="post" novalidate class="row g-3 align-items-end">
                {% csrf_token %}
                <div class="col-12 col-md-8">
                    <label for="{{ form.report_type.id_for_label }}" class="form-label fw-semibold">{{ form.report_type.label }}</label>
                    {{ form.report_type }}
                </div>
                <div class="col-12 col-md-4">
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-gear-fill me-1"></i>Generate Report
                    </button>
                </div>
            </form>
        </div>

        {% if report_html %}
            <div class="card shadow-sm">
                <div class="card-header bg-light py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h2 class="h5 mb-0 fw-semibold text-dark text-capitalize"><i class="bi bi-file-earmark-text me-2"></i>{{ report_type }} Report Result</h2>
                    <a href="{% url 'download_report' report_type %}" class="btn btn-secondary btn-sm px-3">
                        <i class="bi bi-file-earmark-pdf me-1"></i>Download PDF
                    </a>
                </div>
                <div class="card-body p-4">
                    <div>{{ report_html|safe }}</div>
                </div>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
